name: "✨ 功能建议"
description: "提交对 OpenClaw 配置管理器发布版的功能建议"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量说明使用场景和预期效果。

  - type: dropdown
    id: type
    attributes:
      label: 建议类型
      options:
        - 新功能
        - 功能优化
        - UI/UX 改进
        - 安装向导改进
        - 接入向导改进
        - 文档改进
        - 其他
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 相关页面或组件
      options:
        - 安装向导
        - 飞书接入向导（新版）
        - 飞书接入向导（旧版）
        - 微信接入向导
        - QQ 接入向导
        - 钉钉接入向导
        - Agent 模型配置
        - Provider 管理
        - Agent 身份文件管理
        - 网关管理
        - 日志查看
        - 软件设置
        - 路由绑定
        - Channel 管理
        - Agent 高级配置
        - Tools 配置
        - 浏览器配置
        - 会话管理
        - 记忆管理
        - Skills 管理
        - 发布仓库
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰描述你期望新增或优化的内容
      placeholder: "描述你希望添加或改进的功能..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 请描述这个建议要解决什么问题，会在什么场景下使用
      placeholder: "例如：当我使用 XX 时，我希望能够..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他方案？
      placeholder: "描述你考虑过的其他方案..."
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 确认事项
      options:
        - label: 我已经检查过是否有相同的功能请求
          required: true
